<div class="row mt-3">
    <div class="col">
        <div class="card border-0 shadow-sm bg-white homepage-card">
            <div class="card-body p-4 homepage-card-content profile-list-card-content">
                <div class="row" data-masonry='{"percentPosition": true }'>
                    {% if site.data.profile.scholarships %}
                    <div class="col-12">
                        <div class="mx-2 my-1">
                            <h6>Scholarships</h6>
                            <ul class="list-unstyled mb-1">
                                {% for item in site.data.profile.scholarships %}
                                <li class="media mb-1 institution-entry-item">
                                    <img src="{{ item.logo | relative_url }}" alt="{{ item.name }}" style="width: 40px; margin-top: {{ item.logo_vertical_margin | default: '0px' }};" class="institution-entry-logo">
                                    <div class="media-body">
                                        <div class="institution-name">{{ item.name }}</div>
                                        <div class="small">{{ item.dept }}</div>
                                        <div class="small d-flex">
                                            <div>{{ item.position }}</div>
                                            <div class="mt-auto ml-auto no-break institution-entry-date"><em>{{ item.date }}</em></div>
                                        </div>
                                    </div>
                                </li>
                                {% endfor %}
                            </ul>
                        </div>
                    </div>
                    {% endif %}
                </div>

            </div>
        </div>
    </div>
</div>
