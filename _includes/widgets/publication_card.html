{% assign publications = include.publications %}
<div class="my-3 p-0 bg-white shadow-sm rounded-xl homepage-card homepage-card-content">
    <div class="pt-4 px-4 pb-1">
        <div class="mx-2 mt-1 mb-0">
            <h6 class="publication-card-heading mb-0">{% if include.title %}{{ include.title }}{% else %}<i class="fas fa-star"></i> Selected Recent Publications{% endif %}</h6>
        </div>
    </div>
    {% for item in publications limit:include.limit %}
        {% include widgets/publication_item.html item=item first=false last=false %}    
    {% endfor %}
    <!-- Show all publications link at the bottom right corner of the card -> calls .../publications.html -->

        <a href="{{ 'publications' | relative_url }}">All publications <i class="fas fa-angle-double-right"></i></a>
    </h6> -->
</div>
