<nav class="navbar navbar-expand fixed-top mb-5 shadow-sm site-navbar">
    <div class="{% if page.container_class %}{{ page.container_class }}{% else %}container-lg{% endif %}">
        {% assign home_page = site.data.navigation.pages | where: "name", "Home" | first %}
        <a class="navbar-brand" href="{% if home_page %}{{ home_page.url | relative_url }}{% else %}{{ '/' | relative_url }}{% endif %}"><strong>{{site.data.profile.navbar_name}}</strong></a>

        <ul class="navbar-nav ml-auto">
            {% for item in site.data.navigation.pages %}
            <li class="nav-item {% if item.name == page.navbar_title %}active{% endif %}">
                <a class="nav-link" href="{{ item.url | relative_url }}">{{ item.name }}</a>
            </li>
            {% endfor %}
        </ul>
    </div>
</nav>
